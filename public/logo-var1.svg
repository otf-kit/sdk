<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#805ad5" />
    </linearGradient>

    <!-- Dark Faces -->
    <linearGradient id="darkTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#262626" />
      <stop offset="100%" stop-color="#171717" />
    </linearGradient>
    <linearGradient id="darkLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1f1f" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="darkRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0f0f0f" />
    </linearGradient>
  </defs>

  <!-- Top Face (O) -->
  <g transform="matrix(0.866025, 0.5, -0.866025, 0.5, 50, 10)">
    <rect x="1" y="1" width="38" height="38" rx="4" fill="url(#darkTop)" />
    <path d="M 6 6 h 28 v 28 h -28 Z m 8 8 v 12 h 12 v -12 Z" fill="none" stroke="url(#brandGrad)" stroke-width="3" stroke-linejoin="round" />
  </g>

  <!-- Left Face (T) -->
  <g transform="matrix(0.866025, 0.5, 0, 1, 15.359, 30)">
    <rect x="1" y="1" width="38" height="38" rx="4" fill="url(#darkLeft)" />
    <path d="M 6 6 h 28 v 8 h -10 v 20 h -8 v -20 h -10 Z" fill="none" stroke="url(#brandGrad)" stroke-width="3" stroke-linejoin="round" />
  </g>

  <!-- Right Face (F) -->
  <g transform="matrix(0.866025, -0.5, 0, 1, 50, 50)">
    <rect x="1" y="1" width="38" height="38" rx="4" fill="url(#darkRight)" />
    <path d="M 6 6 h 28 v 8 h -20 v 4 h 14 v 8 h -14 v 8 h -8 Z" fill="none" stroke="url(#brandGrad)" stroke-width="3" stroke-linejoin="round" />
  </g>
</svg>
