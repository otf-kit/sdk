<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Brand Faces Gradients -->
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#5b21b6" />
    </linearGradient>
    <linearGradient id="faceRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>

    <!-- Drop Shadow for White Letters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Top Face (O) -->
  <g transform="matrix(0.866025, 0.5, -0.866025, 0.5, 50, 10)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="url(#faceTop)" />
    <path d="M 8 8 h 24 v 24 h -24 Z m 6 6 v 12 h 12 v -12 Z" fill-rule="evenodd" fill="#ffffff" filter="url(#shadow)" />
  </g>

  <!-- Left Face (T) -->
  <g transform="matrix(0.866025, 0.5, 0, 1, 15.359, 30)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="url(#faceLeft)" />
    <path d="M 8 8 h 24 v 6 h -9 v 18 h -6 v -18 h -9 Z" fill="#ffffff" filter="url(#shadow)" />
  </g>

  <!-- Right Face (F) -->
  <g transform="matrix(0.866025, -0.5, 0, 1, 50, 50)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="url(#faceRight)" />
    <path d="M 8 8 h 24 v 6 h -18 v 4 h 12 v 6 h -12 v 8 h -6 Z" fill="#ffffff" filter="url(#shadow)" />
  </g>
</svg>
