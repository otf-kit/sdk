<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Light Faces for 3D Isometric Effect -->
    <linearGradient id="lightTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f5f5" />
    </linearGradient>
    <linearGradient id="lightLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafafa" />
      <stop offset="100%" stop-color="#e5e5e5" />
    </linearGradient>
    <linearGradient id="lightRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5" />
      <stop offset="100%" stop-color="#d4d4d4" />
    </linearGradient>

    <!-- Vibrant Orange Brand Gradient for Letters -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>

    <!-- Subtle Outer Glow / Drop Shadow for Letters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#f97316" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Top Face (O) -->
  <g transform="matrix(0.866025, 0.5, -0.866025, 0.5, 50, 10)">
    <rect x="1" y="1" width="38" height="38" rx="4" fill="url(#lightTop)" />
    <path d="M 8 8 h 24 v 24 h -24 Z m 6 6 v 12 h 12 v -12 Z" fill-rule="evenodd" fill="url(#brandGrad)" filter="url(#shadow)" />
  </g>

  <!-- Left Face (T) -->
  <g transform="matrix(0.866025, 0.5, 0, 1, 15.359, 30)">
    <rect x="1" y="1" width="38" height="38" rx="4" fill="url(#lightLeft)" />
    <path d="M 8 8 h 24 v 6 h -9 v 18 h -6 v -18 h -9 Z" fill="url(#brandGrad)" filter="url(#shadow)" />
  </g>

  <!-- Right Face (F) -->
  <g transform="matrix(0.866025, -0.5, 0, 1, 50, 50)">
    <rect x="1" y="1" width="38" height="38" rx="4" fill="url(#lightRight)" />
    <path d="M 8 8 h 24 v 6 h -18 v 4 h 12 v 6 h -12 v 8 h -6 Z" fill="url(#brandGrad)" filter="url(#shadow)" />
  </g>
</svg>
